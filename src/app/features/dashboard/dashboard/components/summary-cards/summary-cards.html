@if (loading()) {
  <!-- Skeleton loader -->
  <div
    class="rounded-2xl p-6 shadow-md border-l-8 border-gray-200 bg-white h-full animate-pulse"
    style="min-width: 200px"
    aria-hidden="true"
  >
    <div class="flex items-center justify-between">
      <div class="shrink-0">
        <div class="w-14 h-14 rounded-full bg-gray-200"></div>
      </div>
      <div class="flex-1 flex flex-col justify-center ml-5 gap-2">
        <div class="h-3 w-24 bg-gray-200 rounded"></div>
        <div class="h-8 w-16 bg-gray-200 rounded"></div>
      </div>
    </div>
  </div>
} @else {
  <div
    class="rounded-2xl p-6 shadow-md hover:shadow-lg transition-all duration-300 flex items-center justify-between border-l-8 h-full bg-white"
    [class.border-yellow-400]="title() === 'Pending'"
    [class.border-green-500]="title() === 'Approved (This Month)'"
    [class.border-red-500]="title() === 'Denied'"
    [class.border-blue-400]="title() === 'Appeals in Progress'"
    [class.border-red-700]="title() === 'Urgent'"
    style="min-width: 200px"
    role="status"
    [attr.aria-label]="title() + ': ' + value()"
  >
    <div class="shrink-0">
      <div
        class="w-14 h-14 rounded-full flex items-center justify-center bg-primary/10 shadow-inner"
      >
        <mat-icon class="text-primary text-3xl" aria-hidden="true">{{ icon() }}</mat-icon>
      </div>
    </div>

    <div class="flex-1 flex flex-col justify-center ml-5">
      <p class="text-sm text-secondary font-medium tracking-wide">
        {{ title() }}
      </p>

      <h2 class="text-4xl font-heading leading-none mt-1" [ngClass]="colorClass()">
        {{ value() }}
      </h2>

      @if (isUrgent() && value() > 0) {
        <p class="text-xs text-danger mt-2 font-semibold uppercase animate-pulse">
          Attention needed!
        </p>
      }
    </div>
  </div>
}
